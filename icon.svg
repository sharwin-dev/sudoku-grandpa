<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Accent Gradient for Sudoku Key -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle Inner Border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#334155" stroke-width="6" opacity="0.5" />

  <!-- Sudoku Grid Layout Pattern -->
  <g stroke="#334155" stroke-width="4" opacity="0.3" stroke-linecap="round">
    <!-- Grid Lines (Outer bounds are implicit) -->
    <line x1="170.6" y1="80" x2="170.6" y2="432" />
    <line x1="341.3" y1="80" x2="341.3" y2="432" />
    <line x1="80" y1="170.6" x2="432" y2="170.6" />
    <line x1="80" y1="341.3" x2="432" y2="341.3" />
  </g>
  
  <!-- Thicker Grid Division Lines -->
  <g stroke="#475569" stroke-width="8" opacity="0.6" stroke-linecap="round">
    <line x1="256" y1="64" x2="256" y2="448" />
    <line x1="64" y1="256" x2="448" y2="256" />
  </g>

  <!-- Number Graphics inside the cells (Aesthetically arranged) -->
  <!-- "9" in top-left block -->
  <text x="125" y="145" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" fill="#64748b" text-anchor="middle" dominant-baseline="central">9</text>
  
  <!-- "5" in bottom-right block -->
  <text x="387" y="387" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" fill="#64748b" text-anchor="middle" dominant-baseline="central">5</text>
  
  <!-- "3" in center block -->
  <text x="256" y="256" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">3</text>
  
  <!-- "7" highlighted in top-right block -->
  <text x="387" y="125" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="96" fill="url(#accentGrad)" filter="url(#glow)" text-anchor="middle" dominant-baseline="central">7</text>
</svg>
